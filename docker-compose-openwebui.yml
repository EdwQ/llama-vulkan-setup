version: '3.8'

services:
  # Open WebUI - 提供类似 ChatGPT 的 Web 界面
  open-webui:
    image: openwebui/open-webui:main
    container_name: open-webui
    ports:
      - 3000:8080
    volumes:
      - open-webui:/app/backend/data
    environment:
      # 连接本地 llama.cpp 服务器
      - OLLAMA_BASE_URL=http://host.docker.internal:8081
      # 关闭认证（开发环境）
      - WEBUI_AUTH=false
      # 允许访问外部 API
      - ENABLE_WEBUI_AUTH=false
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped
    networks:
      - llm-network

  # Ollama - 可选，用于管理模型
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama:/root/.ollama
    ports:
      - 11434:11434
    restart: unless-stopped
    networks:
      - llm-network
    # GPU 支持（如需）
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  open-webui:
  ollama:

networks:
  llm-network:
    driver: bridge
